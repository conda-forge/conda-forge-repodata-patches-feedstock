# yaml-language-server: $schema=../patch_yaml_model.json
# from this bit of code
# # fix numba / numpy compatibility; numba added a run_constrained entry
# # for numpy as of version=0.54.0; numpy<1.21a0 is a conservative upper
# # bound that may not be strict enough for old versions of numba
# if (
#     record_name == "numba"
#     and record.get("timestamp", 0) <= 1671537177000
#     and parse_version(record["version"]) < parse_version("0.54")
# ):
#     deps = record["depends"]
#     for i, dep in enumerate(deps):
#         if dep == "numpy":
#             deps[i] = "numpy <1.21.0a0"
#             break
#         if dep.startswith("numpy ") and "<" in dep:
#             _pin_stricter(fn, record, "numpy", "x.x", "1.21")
#             break
#         if dep.startswith("numpy ") and ">" in dep:
#             deps[i] += ",<1.21.0a0"
#             break
if:
  name: numba
  timestamp_le: 1671537177000
  version_lt: "0.54"
  has_depends: numpy
then:
  - replace_depends:
      old: numpy
      new: numpy <1.21.0a0
---
if:
  name: numba
  timestamp_le: 1671537177000
  version_lt: "0.54"
  has_depends: numpy >=*,<*
then:
  - tighten_depends:
      name: numpy
      upper_bound: "1.21"
---
if:
  name: numba
  timestamp_le: 1671537177000
  version_lt: "0.54"
  has_depends: numpy >=*
  not_has_depends: numpy >=*,<*
then:
  - replace_depends:
      old: numpy >=*
      new: ${old},<1.21.0a0
---
if:
  name: numba
  timestamp_le: 1749486739000
  version: "0.61.2"
  has_depends: numpy >=1.24
then:
  - replace_depends:
      old: numpy >=1.24
      new: ${old},<2.3.0a0
---
# numba 0.55.x uses `from pkg_resources import iter_entry_points` in
# numba/core/entrypoints.py. pkg_resources was removed from setuptools
# in version 82.0.0, so numba 0.55.x fails to import with setuptools >=82.
# Numba 0.56+ switched to importlib.metadata and is not affected.
# Numba 0.54 and below did not have the entrypoints mechanism.
if:
  name: numba
  timestamp_le: 1775229485000
  version_ge: "0.55.0"
  version_lt: "0.56"
  has_depends: setuptools
then:
  - tighten_depends:
      name: setuptools
      upper_bound: "82"
