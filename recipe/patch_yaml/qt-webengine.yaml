# from this bit of code
# if record_name == "qt-webengine" and record["version"] == "5.15.4" and record["build_number"] == 1:
#     # Allow users to depend on qt 5.15.2 or 5.15.3 metapackage
#     record["constrains"] = [c for c in record["constrains"]
#                             if not c.startswith("qt ")]
#     record["constrains"].append("qt 5.15.2|5.15.3|5.15.4")
if:
  name: qt-webengine
  version: 5.15.4
  build_number: 1
then:
  - replace_constrains:
      old: qt *
      new: qt 5.15.2|5.15.3|5.15.4

---

if:
  name: qt-webengine
  version: 5.15.8
  build_number_ge: 4
  build_number_lt: 7

then:
  - remove_depends:
      - gstreamer*
      - gst-plugins-base*

---

# We only aded the run_export to libxkbfile after qt6-webegine 6.10 was built the first time
# https://github.com/conda-forge/libxkbfile-feedstock/pull/3
# https://github.com/conda-forge/pyside2-feedstock/pull/297
if:
  timestamp_lt: 1778373415000
  name: qt6-webengine
  version: 6.10.2
  build_number: 0
  subdir_in: linux-64
then:
  - add_depends: libxkbfile >=1.1.0,<2
